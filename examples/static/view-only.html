<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f0f4f8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0d102d" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="assets/favicon.ico">
  <link rel="apple-touch-icon" href="assets/fastnear_logo_black.png">
  <title>View Only — @fastnear example</title>
  <meta property="og:type" content="website">
  <meta property="og:title" content="View Only — @fastnear example">
  <meta property="og:description" content="Read on-chain data with near.view() — no wallet needed. Fetches wNEAR token metadata from mainnet.">
  <meta property="og:image" content="assets/fastnear_logo_black.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- @fastnear/api — gives us the global `near` object.
       No wallet needed for read-only view calls. -->
  <script src="https://cdn.jsdelivr.net/npm/@fastnear/api@1.0/dist/umd/browser.global.js"></script>
</head>
<body>
<div class="container">
  <header class="brand-header">
    <a class="brand-wordmark" href="index.html">FastNear</a>
    <hr class="brand-divider">
  </header>

  <h1>View Only</h1>
  <p class="subtitle">
    Read on-chain data with <code>near.view()</code> — no wallet, no sign-in
    &nbsp;·&nbsp; <a href="index.html">back</a>
  </p>

  <section>
    <h2>wNEAR Token Metadata</h2>
    <div id="metadata">Loading...</div>
  </section>

  <section>
    <h2>Code</h2>
    <pre><code>near.config({ networkId: 'mainnet' });

const metadata = await near.ft.metadata({ contractId: 'wrap.near' });</code></pre>
  </section>
</div>

<script>
  near.config({ networkId: 'mainnet' });

  (async () => {
    try {
      const meta = await near.ft.metadata({ contractId: 'wrap.near' });

      document.getElementById('metadata').innerHTML = `
        <table class="metadata-table">
          <tr><td>Name</td><td>${meta.name}</td></tr>
          <tr><td>Symbol</td><td>${meta.symbol}</td></tr>
          <tr><td>Decimals</td><td>${meta.decimals}</td></tr>
          <tr><td>Icon</td><td><img src="${meta.icon}" alt="${meta.name}" width="48" height="48" style="border-radius:8px"></td></tr>
        </table>
        <details style="margin-top:12px">
          <summary style="cursor:pointer;color:var(--text-muted);font-size:0.85rem">Raw JSON</summary>
          <pre style="margin-top:8px">${JSON.stringify(meta, null, 2)}</pre>
        </details>`;
    } catch (err) {
      document.getElementById('metadata').textContent = 'Error: ' + err.message;
    }
  })();
</script>
<footer class="brand-footer">&copy; 2026 FastNear · <a href="https://github.com/fastnear/js-monorepo" target="_blank" rel="noopener">GitHub</a></footer>
</body>
</html>
